<section class="py-24 bg-surface-0" id="faq">
  <div class="max-w-3xl mx-auto px-6">
    <div class="text-center mb-16 reveal">
      <h2 class="text-3xl md:text-4xl tracking-tight font-semibold text-surface-900 mb-4">
        Perguntas frequentes
      </h2>
    </div>

    <div class="space-y-4 reveal delay-100">
      @for (item of items; track item.question; let i = $index) {
        <div
          class="border rounded-xl overflow-hidden transition-all duration-200"
          [class.border-primary/30]="openIndex() === i"
          [class.border-surface-200]="openIndex() !== i"
          [class.bg-surface-0]="openIndex() === i"
          [class.bg-surface-50/50]="openIndex() !== i"
          [class.hover:border-surface-200]="openIndex() !== i"
        >
          <button
            class="w-full flex items-center justify-between p-5 text-left cursor-pointer font-medium transition-colors"
            [class.text-primary]="openIndex() === i"
            [class.text-surface-900]="openIndex() !== i"
            (click)="toggle(i)"
            type="button"
          >
            <span>{{ item.question }}</span>
            <ng-icon
              name="lucidePlusCircle"
              width="24"
              class="shrink-0 transition-transform duration-300 text-slate-400"
              [class.rotate-45]="openIndex() === i"
              [class.text-primary]="openIndex() === i"
            ></ng-icon>
          </button>

          @if (openIndex() === i) {
            <div class="px-5 pb-5 text-sm text-muted-color font-normal leading-relaxed border-t border-surface-200/50 pt-4">
              {{ item.answer }}
            </div>
          }
        </div>
      }
    </div>
  </div>
</section>
