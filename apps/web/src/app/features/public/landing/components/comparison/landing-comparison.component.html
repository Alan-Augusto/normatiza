<section class="py-24 bg-surface-900 text-white border-t border-surface-800 relative overflow-hidden">
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom,rgba(93,4,153,0.15)_0%,transparent_70%)] pointer-events-none"></div>

  <div class="max-w-5xl mx-auto px-6 relative z-10">
    <div class="text-center wfull mx-auto mb-16 reveal">
      <h2 class="text-3xl md:text-4xl tracking-tight font-semibold mb-4">
        Sua operação antes e depois da Normatiza
      </h2>
    </div>

    <div class="grid md:grid-cols-2 bg-surface-800/40 backdrop-blur-md rounded-2xl border border-slate-700 overflow-hidden reveal delay-100 shadow-2xl">
      <!-- Antes -->
      <div class="p-8 md:p-12 border-b md:border-b-0 md:border-r border-slate-700/50 bg-surface-800/20">
        <h3 class="text-lg font-medium text-slate-400 mb-8 flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-red-500/10 flex items-center justify-center text-red-400">
            <ng-icon name="lucideXCircle" width="20"></ng-icon>
          </div>
          Sem Normatiza
        </h3>
        <ul class="space-y-6">
          @for (item of beforeItems; track item) {
            <li class="flex items-start gap-4 text-slate-400 text-sm font-normal">
              <ng-icon name="lucideMinusCircle" class="shrink-0 text-muted-color mt-0.5 text-lg"></ng-icon>
              {{ item }}
            </li>
          }
        </ul>
      </div>

      <!-- Depois -->
      <div class="p-8 md:p-12 bg-gradient-to-br from-primary/20 to-primary/5 relative group">
        <div class="absolute inset-0 bg-primary/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
        <h3 class="text-lg font-medium text-white mb-8 flex items-center gap-3 relative z-10">
          <div class="w-8 h-8 rounded-full bg-primary-400/20 flex items-center justify-center text-primary-400">
            <ng-icon name="lucideCheckCircle" width="20"></ng-icon>
          </div>
          Com Normatiza
        </h3>
        <ul class="space-y-6 relative z-10">
          @for (item of afterItems; track item) {
            <li class="flex items-start gap-4 text-slate-200 text-sm font-normal">
              <ng-icon name="lucideCheckCircle" class="shrink-0 text-primary-400 mt-0.5 text-lg"></ng-icon>
              {{ item }}
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</section>
