<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  .slide-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 1000px;
    height: 500px;
    background: transparent;
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    margin: 0 auto;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .chaos-zone {
    width: 35%;
    height: 100%;
    position: relative;
  }

  .chaos-item {
    position: absolute;
    width: 40px;
    height: 40px;
    fill: #64748b;
    opacity: 0;
    transition: all 1s cubic-bezier(0.25, 0.1, 0.25, 1);
    transform-origin: center;
  }

  @keyframes float {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(10deg); }
    100% { transform: translateY(0px) rotate(0deg); }
  }

  .floating {
    animation: float 3s ease-in-out infinite;
    opacity: 0.8;
  }

  .processing-core {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .core-ring {
    width: 80px;
    height: 80px;
    border: 2px dashed #3b82f6;
    border-radius: 50%;
    animation: spin 6s linear infinite;
    position: absolute;
  }

  .core-center {
    width: 40px;
    height: 40px;
    background: rgba(59, 130, 246, 0.2);
    border: 2px solid #3b82f6;
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes spin { 100% { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
    50% { transform: scale(1.1); box-shadow: 0 0 40px rgba(59, 130, 246, 0.8); }
  }

  .app-zone {
    width: 35%;
    display: flex;
    justify-content: center;
    z-index: 10;
  }

  .phone-mockup {
    width: 240px;
    height: 420px;
    background: #1e293b;
    border: 8px solid #334155;
    border-radius: 30px;
    box-shadow: -10px 10px 30px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .phone-header {
    background: #0f172a;
    padding: 15px 0 10px 0;
    text-align: center;
    position: relative;
    border-bottom: 1px solid #334155;
  }

  .phone-notch {
    width: 60px;
    height: 15px;
    background: #334155;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    border-bottom-left-radius: 10px;
    border-bottom-right-radius: 10px;
  }

  .app-title {
    color: #f8fafc;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .phone-screen {
    flex: 1;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: hidden;
  }

  .app-card {
    background: #3b82f6;
    border-radius: 8px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateX(100%);
    opacity: 0;
    animation: slideIn 0.5s forwards cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .app-card .icon {
    width: 20px;
    height: 20px;
    fill: #fff;
  }

  .app-card .lines {
    flex: 1;
  }

  .app-card .line {
    height: 4px;
    background: rgba(255,255,255,0.4);
    border-radius: 2px;
    margin-bottom: 4px;
  }
  .app-card .line.short { width: 60%; }

  @keyframes slideIn {
    to { transform: translateX(0); opacity: 1; }
  }
</style>
</head>
<body>

<div class="slide-container">
  <div class="chaos-zone" id="chaosZone"></div>

  <div class="processing-core">
    <div class="core-ring"></div>
    <div class="core-center"></div>
  </div>

  <div class="app-zone">
    <div class="phone-mockup">
      <div class="phone-header">
        <div class="phone-notch"></div>
        <span class="app-title">Gestão NR-12</span>
      </div>
      <div class="phone-screen" id="appScreen"></div>
    </div>
  </div>
</div>

<script>
  const svgs = [
    '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>', 
    '<svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>', 
    '<svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>' 
  ];

  const container = document.querySelector('.slide-container');
  const appScreen = document.getElementById('appScreen');
  let activeInterval;

  function spawnChaosElement() {
    const el = document.createElement('div');
    el.className = 'chaos-item floating';
    
    const randomSvg = svgs[Math.floor(Math.random() * svgs.length)];
    el.innerHTML = randomSvg;

    const startX = Math.random() * 250 + 20; 
    const startY = Math.random() * 400 + 50;
    
    el.style.left = `${startX}px`;
    el.style.top = `${startY}px`;
    
    container.appendChild(el);

    setTimeout(() => {
      el.classList.remove('floating');
      
      const centerX = container.clientWidth / 2 - 20;
      const centerY = container.clientHeight / 2 - 20;

      el.style.left = `${centerX}px`;
      el.style.top = `${centerY}px`;
      el.style.transform = 'scale(0.2) rotate(180deg)';
      el.style.opacity = '0.3';
      el.style.fill = '#3b82f6'; 

      setTimeout(() => {
        el.remove();
        addOrganizedCardToApp(randomSvg);
      }, 1000); 

    }, Math.random() * 1500 + 1000);
  }

  function addOrganizedCardToApp(svgIcon) {
    const card = document.createElement('div');
    card.className = 'app-card';
    card.innerHTML = `
      <div class="icon">${svgIcon}</div>
      <div class="lines">
        <div class="line"></div>
        <div class="line short"></div>
      </div>
    `;
    
    appScreen.insertBefore(card, appScreen.firstChild);

    if (appScreen.children.length > 5) {
      appScreen.lastElementChild.remove();
    }
  }

  activeInterval = setInterval(spawnChaosElement, 1200);
</script>
</body>
</html>
