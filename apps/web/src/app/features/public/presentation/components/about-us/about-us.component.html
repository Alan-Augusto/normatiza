<div class="slide-content premium-dark-alt">
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>
  <div class="inner">
    <div class="split-layout">
      <div class="text-side">
        <h2 class="section-title">{{ t().aboutUs.title }}</h2>
        <p class="section-subtitle">{{ t().aboutUs.subtitle }}</p>
      </div>
      <div class="highlights-grid">
        @for (highlight of t().aboutUs.highlights; track highlight) {
          <div class="highlight-card">
            <div class="highlight-icon">
              <ng-icon [name]="highlight.icon" size="24"></ng-icon>
            </div>
            <h3 class="highlight-title">{{ highlight.title }}</h3>
            <p class="highlight-text">{{ highlight.text }}</p>
          </div>
        }
      </div>
    </div>
  </div>
</div>
