<div class="slide-content premium-light" [class.is-visible]="isVisible">
  <div class="inner">
    <!-- Stats Section (Centralizado) -->
    <div class="stats-section">
      <h2 class="section-title">{{ t().socialProof.title }}</h2>

      <div class="premium-stats">
        <div class="stat-box glass-light stat-anim-0">
          <div class="stat-icon">
            <ng-icon name="lucideUsers" size="36"></ng-icon>
          </div>
          <span class="num">{{ t().socialProof.stats.clients.value }}</span>
          <span class="label">{{ t().socialProof.stats.clients.label }}</span>
        </div>
        <div class="stat-box glass-light stat-anim-1">
          <div class="stat-icon">
            <ng-icon name="lucideGlobe" size="36"></ng-icon>
          </div>
          <span class="num">{{ t().socialProof.stats.team.value }}</span>
          <span class="label">{{ t().socialProof.stats.team.label }}</span>
        </div>
        <div class="stat-box glass-light stat-anim-2">
          <div class="stat-icon">
            <ng-icon name="lucideZap" size="36"></ng-icon>
          </div>
          <span class="num">{{ t().socialProof.stats.speed.value }}</span>
          <span class="label">{{ t().socialProof.stats.speed.label }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
