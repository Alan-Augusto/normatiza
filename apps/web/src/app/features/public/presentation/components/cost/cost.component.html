<div class="slide-content premium-dark">
  <div class="bg-gradient"></div>

  <div class="inner">
    <div class="header-content">
      <h2 class="section-title">{{ t().cost.title }}</h2>
      <div class="line-decorator"></div>
    </div>

    <div class="cards-row">
      @for (card of t().cost.cards; track card; let i = $index) {
        <div class="cost-card" [style.animation-delay]="(i * 0.12) + 's'">
          <div class="card-glow"></div>
          <div class="icon-wrapper">
            <ng-icon [name]="card.icon" size="48" class="danger-icon anim-icon-{{i}}"></ng-icon>
          </div>
          <h3 class="card-title">{{ card.title }}</h3>
          <p class="card-text">{{ card.text }}</p>
        </div>
      }
    </div>

    <div class="tagline-wrapper">
      <div class="tagline-glow"></div>
      <p class="tagline">{{ t().cost.tagline }}</p>
    </div>
  </div>
</div>
